version: "3.9"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      TZ: Europe/London
      N8N_HOST: n8n.home.arpa
      N8N_PORT: 5678
      N8N_PROTOCOL: http
    volumes:
      - /opt/stacks/n8n/data:/home/node/.n8n
