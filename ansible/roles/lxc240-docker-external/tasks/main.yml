---
- name: Deploy compose bundles for docker-external
  ansible.builtin.include_role:
    name: docker
    tasks_from: deploy_compose_bundle.yml
  vars:
    compose_bundle_name: lxc240-docker-external
    compose_stacks: "{{ build_inventory.services.lxc240_docker_external | dict2items | selectattr('value.enabled') | map(attribute='key') | list }}"
    docker_host_paths:
      - path: /mnt/appdata/docker_volumes/ghost/content
      - path: /mnt/appdata/docker_volumes/kutt/db
      - path: /mnt/appdata/docker_volumes/nginx/html
      - path: /mnt/appdata/docker_volumes/nginx/logs
      - path: /mnt/appdata/docker_volumes/portainer
      - path: /mnt/appdata/docker_volumes/rustdesk/data
      - path: /mnt/appdata/docker_volumes/rustdesk/tailscale-state
      - path: /mnt/appdata/docker_volumes/tailscale-peer-relay/state
      - path: /mnt/appdata/docker_volumes/wordpress/db
      - path: /mnt/appdata/docker_volumes/wordpress/html
  when: (build_inventory.services.lxc240_docker_external | dict2items | selectattr('value.enabled') | list | length) > 0
