---
lxc250_infra_control_packages:
  - git
  - ansible
  - openssh-client
  - openssh-server
  - rsync
  - python3
  - python3-pip
  - curl
  - wget
  - vim
  - jq

# Shared control-node root on mounted appdata
lxc250_infra_control_root: "/mnt/appdata/homelab-control"
lxc250_infra_bin_dir: "{{ lxc250_infra_control_root }}/bin"

# Git repo configuration (SSH URL for private repo access via deploy key)
lxc250_infra_repo_url: "git@github.com:wrightwells/HomeLab.git"
lxc250_infra_repo_dest: "{{ lxc250_infra_control_root }}/HomeLab"

# SSH deploy key published to shared appdata
lxc250_infra_deploy_key_src: "{{ lxc250_infra_bin_dir }}/github-deploy-key"
lxc250_infra_deploy_key_src_pub: "{{ lxc250_infra_bin_dir }}/github-deploy-key.pub"
lxc250_infra_deploy_vault_pass_src: "{{ lxc250_infra_bin_dir }}/homelab-vault-pass.txt"
lxc250_infra_ssh_key_dest: "/root/.ssh/id_ed25519"
lxc250_infra_ssh_key_dest_pub: "/root/.ssh/id_ed25519.pub"

# SSH configuration for host access
lxc250_infra_ssh_config_dest: "/root/.ssh/config"
lxc250_infra_ssh_known_hosts_dest: "/root/.ssh/known_hosts"

# Ansible vault password file
lxc250_infra_vault_pass_dest: "/root/.config/ansible/homelab-vault-pass.txt"

# Ansible collections path
lxc250_infra_collections_path: "/root/.ansible/collections"
