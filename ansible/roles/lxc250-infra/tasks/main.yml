---
- name: Install infra control-node packages
  ansible.builtin.apt:
    name: "{{ lxc250_infra_control_packages }}"
    state: present
    update_cache: true

- name: Ensure shared control-node root exists
  ansible.builtin.file:
    path: "{{ lxc250_infra_control_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  ignore_errors: true
  failed_when: false
  register: infra_control_root_result

- name: Ensure shared control-node root exists (fallback - no chown)
  ansible.builtin.file:
    path: "{{ lxc250_infra_control_root }}"
    state: directory
    mode: "0755"
  when: infra_control_root_result is defined and infra_control_root_result.failed | default(false)

# --- SSH control-plane setup ---

- name: Ensure SSH directory exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install SSH deploy key from published location
  ansible.builtin.copy:
    src: "{{ lxc250_infra_deploy_key_src }}"
    dest: "{{ lxc250_infra_ssh_key_dest }}"
    owner: root
    group: root
    mode: "0600"

- name: Install SSH deploy key public half
  ansible.builtin.copy:
    src: "{{ lxc250_infra_deploy_key_src_pub }}"
    dest: "{{ lxc250_infra_ssh_key_dest_pub }}"
    owner: root
    group: root
    mode: "0644"

- name: Deploy SSH config for homelab host access
  ansible.builtin.copy:
    content: |
      Host 10.10.*.* 10.20.*.*
          StrictHostKeyChecking accept-new
          IdentitiesOnly yes
          IdentityFile {{ lxc250_infra_ssh_key_dest }}
          UserKnownHostsFile {{ lxc250_infra_ssh_known_hosts_dest }}

      Host github.com
          StrictHostKeyChecking accept-new
          IdentitiesOnly yes
          IdentityFile {{ lxc250_infra_ssh_key_dest }}
          UserKnownHostsFile {{ lxc250_infra_ssh_known_hosts_dest }}
    dest: "{{ lxc250_infra_ssh_config_dest }}"
    owner: root
    group: root
    mode: "0600"

- name: Ensure SSH server is running and enabled
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true

# --- Git repo clone (uses SSH deploy key) ---

- name: Clone or update HomeLab repository for infra control-node use
  ansible.builtin.git:
    repo: "{{ lxc250_infra_repo_url }}"
    dest: "{{ lxc250_infra_repo_dest }}"
    version: main
    update: true
    accept_hostkey: true

# --- Ansible vault password file ---

- name: Ensure ansible config directory exists
  ansible.builtin.file:
    path: /root/.config/ansible
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy ansible vault password file from published location
  ansible.builtin.copy:
    src: "{{ lxc250_infra_deploy_vault_pass_src }}"
    dest: "{{ lxc250_infra_vault_pass_dest }}"
    owner: root
    group: root
    mode: "0600"

# --- Ansible collections ---

- name: Install required Ansible collections on infra control node
  ansible.builtin.command:
    cmd: >-
      ansible-galaxy collection install
      -r {{ lxc250_infra_repo_dest }}/ansible/requirements.yml
      --collections-path {{ lxc250_infra_collections_path }}
  changed_when: false

- name: Ensure infra monitoring config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /mnt/appdata/configs/alertmanager
    - /mnt/appdata/configs/prometheus
  when: build_inventory.services.lxc250_infra.alertmanager.enabled | bool or build_inventory.services.lxc250_infra.prometheus.enabled | bool

- name: Deploy Alertmanager config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/compose/lxc250-infra/alertmanager/alertmanager.yml"
    dest: /mnt/appdata/configs/alertmanager/alertmanager.yml
    owner: root
    group: root
    mode: "0644"
  when: build_inventory.services.lxc250_infra.alertmanager.enabled | bool

- name: Deploy Prometheus config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/compose/lxc250-infra/prometheus/prometheus.yml"
    dest: /mnt/appdata/configs/prometheus/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  when: build_inventory.services.lxc250_infra.prometheus.enabled | bool

- name: Deploy compose bundles for infra
  ansible.builtin.include_role:
    name: docker
    tasks_from: deploy_compose_bundle.yml
  vars:
    compose_bundle_name: lxc250-infra
    compose_stacks: "{{ build_inventory.services.lxc250_infra | dict2items | selectattr('value.enabled') | map(attribute='key') | list }}"
    docker_host_paths:
      - path: /mnt/appdata/configs/alertmanager
      - path: /mnt/appdata/docker_volumes/alertmanager/data
      - path: /mnt/appdata/docker_volumes/grafana/data
      - path: /mnt/appdata/docker_volumes/grafana/log
      - path: /mnt/appdata/configs/homebridge
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
      - path: /mnt/appdata/configs/prometheus
      - path: /mnt/appdata/docker_volumes/portainer
      - path: /mnt/appdata/docker_volumes/prometheus/data
      - path: /mnt/appdata/docker_volumes/semaphore/postgres
      - path: /mnt/appdata/docker_volumes/semaphore/workspace
      - path: /mnt/appdata/docker_volumes/semaphore/.config
      - path: /mnt/appdata/docker_volumes/semaphore/.config/ansible
      - path: /mnt/appdata/docker_volumes/semaphore/tmp
      - path: /mnt/appdata/docker_volumes/semaphore
      - path: /mnt/appdata/docker_volumes/uptime-kuma
  when: (build_inventory.services.lxc250_infra | dict2items | selectattr('value.enabled') | list | length) > 0
