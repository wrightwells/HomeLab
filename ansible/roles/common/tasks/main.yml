---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - ca-certificates
      - gnupg
      - python3
      - python3-pip
      - qemu-guest-agent
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Enable qemu guest agent (VMs only)
  ansible.builtin.service:
    name: qemu-guest-agent
    state: started
    enabled: true
  when: inventory_hostname in groups.get('ai_gpu', []) or inventory_hostname in groups.get('mint_desktop', [])
  ignore_errors: true
