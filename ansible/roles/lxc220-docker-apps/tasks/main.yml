---
- name: Deploy compose bundles for docker-apps
  ansible.builtin.include_role:
    name: docker
    tasks_from: deploy_compose_bundle.yml
  vars:
    compose_bundle_name: lxc220-docker-apps
    compose_stacks:
      - grafana
      - influxdb
      - node-red
      - teslamate
      - calibre
      - calibre-web
      - grist
      - blinko
      - finance
      - eurgo
      - homarr
      - semaphore
      - pairdrop
    docker_host_paths:
      - path: /mnt/appdata/docker_volumes/calibre
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
      - path: /mnt/appdata/docker_volumes/calibre-web
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
