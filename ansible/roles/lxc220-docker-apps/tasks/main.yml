---
- name: Deploy compose bundles for docker-apps
  ansible.builtin.include_role:
    name: docker
    tasks_from: deploy_compose_bundle.yml
  vars:
    compose_bundle_name: lxc220-docker-apps
    compose_stacks:
      - grafana
      - influxdb
      - node-red
      - teslamate
      - homebridge
      - calibre
      - calibre-web
      - grist
      - blinko
      - finance
      - eurgo
      - homarr
      - semaphore
      - pairdrop
