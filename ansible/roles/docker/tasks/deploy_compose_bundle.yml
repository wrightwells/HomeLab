---
- name: Ensure compose root exists
  ansible.builtin.file:
    path: "{{ docker_compose_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure application directories exist
  ansible.builtin.file:
    path: "{{ docker_compose_root }}/{{ item }}"
    state: directory
    owner: "{{ docker_project_owner }}"
    group: "{{ docker_project_group }}"
    mode: "{{ docker_stack_root_mode }}"
  loop: "{{ compose_stacks }}"

- name: Ensure declared host bind-mount paths exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: "{{ item.state | default('directory') }}"
    owner: "{{ item.owner | default(docker_project_owner) }}"
    group: "{{ item.group | default(docker_project_group) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop: "{{ docker_host_paths }}"

- name: Copy compose bundle contents
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/compose/{{ compose_bundle_name }}/{{ item }}/"
    dest: "{{ docker_compose_root }}/{{ item }}/"
    owner: "{{ docker_project_owner }}"
    group: "{{ docker_project_group }}"
    mode: preserve
  loop: "{{ compose_stacks }}"

- name: Render docker-compose from template when present
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../files/compose/{{ compose_bundle_name }}/{{ item }}/docker-compose.yml.j2"
    dest: "{{ docker_compose_root }}/{{ item }}/docker-compose.yml"
    owner: "{{ docker_project_owner }}"
    group: "{{ docker_project_group }}"
    mode: "{{ docker_stack_compose_mode }}"
  loop: "{{ compose_stacks }}"
  when: lookup('ansible.builtin.fileglob', playbook_dir ~ '/../files/compose/' ~ compose_bundle_name ~ '/' ~ item ~ '/docker-compose.yml.j2', wantlist=True) | length > 0

- name: Render stack.env from vaulted source when present
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/compose/{{ compose_bundle_name }}/{{ item }}/stack.env.vault"
    dest: "{{ docker_compose_root }}/{{ item }}/stack.env"
    owner: "{{ docker_project_owner }}"
    group: "{{ docker_project_group }}"
    mode: "{{ docker_stack_env_mode }}"
    decrypt: true
  loop: "{{ compose_stacks }}"
  when: lookup('ansible.builtin.fileglob', playbook_dir ~ '/../files/compose/' ~ compose_bundle_name ~ '/' ~ item ~ '/stack.env.vault', wantlist=True) | length > 0

- name: Render stack.env from template when present
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../files/compose/{{ compose_bundle_name }}/{{ item }}/stack.env.example.j2"
    dest: "{{ docker_compose_root }}/{{ item }}/stack.env"
    owner: "{{ docker_project_owner }}"
    group: "{{ docker_project_group }}"
    mode: "{{ docker_stack_env_mode }}"
  loop: "{{ compose_stacks }}"
  when:
    - lookup('ansible.builtin.fileglob', playbook_dir ~ '/../files/compose/' ~ compose_bundle_name ~ '/' ~ item ~ '/stack.env.vault', wantlist=True) | length == 0
    - lookup('ansible.builtin.fileglob', playbook_dir ~ '/../files/compose/' ~ compose_bundle_name ~ '/' ~ item ~ '/stack.env.example.j2', wantlist=True) | length > 0

- name: Render stack.env from example when no vaulted source exists
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/compose/{{ compose_bundle_name }}/{{ item }}/stack.env.example"
    dest: "{{ docker_compose_root }}/{{ item }}/stack.env"
    owner: "{{ docker_project_owner }}"
    group: "{{ docker_project_group }}"
    mode: "{{ docker_stack_env_mode }}"
  loop: "{{ compose_stacks }}"
  when:
    - lookup('ansible.builtin.fileglob', playbook_dir ~ '/../files/compose/' ~ compose_bundle_name ~ '/' ~ item ~ '/stack.env.vault', wantlist=True) | length == 0
    - lookup('ansible.builtin.fileglob', playbook_dir ~ '/../files/compose/' ~ compose_bundle_name ~ '/' ~ item ~ '/stack.env.example.j2', wantlist=True) | length == 0
    - lookup('ansible.builtin.fileglob', playbook_dir ~ '/../files/compose/' ~ compose_bundle_name ~ '/' ~ item ~ '/stack.env.example', wantlist=True) | length > 0

- name: Start compose stacks
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_root }}/{{ item }}"
    state: present
  loop: "{{ compose_stacks }}"
