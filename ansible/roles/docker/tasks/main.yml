---
- name: Detect Ubuntu-based hosts (VMs)
  ansible.builtin.set_fact:
    docker_is_ubuntu_vm: "{{ ansible_facts['os_family'] == 'Debian' and ansible_facts['distribution'] == 'Ubuntu' }}"

- name: Detect Debian-based hosts (Debian LXCs)
  ansible.builtin.set_fact:
    docker_is_debian_lxc: "{{ ansible_facts['os_family'] == 'Debian' and ansible_facts['distribution'] == 'Debian' }}"

- name: Install prerequisites for Docker official repo (Ubuntu VMs)
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  when: docker_is_ubuntu_vm | default(false)

- name: Create Docker keyrings directory (Ubuntu VMs)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: docker_is_ubuntu_vm | default(false)

- name: Install Docker official GPG key (Ubuntu VMs)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.gpg
    mode: "0644"
  when: docker_is_ubuntu_vm | default(false)

- name: Add Docker official apt repository (Ubuntu VMs)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable\n"
    mode: "0644"
  when: docker_is_ubuntu_vm | default(false)

- name: Install prerequisites for Docker official repo (Debian LXCs)
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  when: docker_is_debian_lxc | default(false)

- name: Create Docker keyrings directory (Debian LXCs)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: docker_is_debian_lxc | default(false)

- name: Install Docker official GPG key (Debian LXCs)
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/debian/gpg -o /tmp/docker.gpg
    gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
    rm -f /tmp/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  when: docker_is_debian_lxc | default(false)

- name: Add Docker official apt repository (Debian LXCs)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable\n"
    mode: "0644"
  when: docker_is_debian_lxc | default(false)

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - python3-docker
    state: present
    update_cache: true
  when: not (docker_is_ubuntu_vm | default(false)) and not (docker_is_debian_lxc | default(false))

- name: Install Docker packages (Ubuntu VMs)
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-plugin
      - python3-docker
    state: present
    update_cache: true
  when: docker_is_ubuntu_vm | default(false)

- name: Install Docker packages (Debian LXCs)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-compose-plugin
      - python3-docker
    state: present
    update_cache: true
  when: docker_is_debian_lxc | default(false)

- name: Start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Ensure compose root exists
  ansible.builtin.file:
    path: "{{ docker_compose_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
