---
- name: Ensure Frigate config directory exists
  ansible.builtin.file:
    path: "{{ frigate_config_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: build_inventory.services.vm210_ai_gpu.frigate.enabled | bool

- name: Deploy managed Frigate config template
  ansible.builtin.template:
    src: frigate-config.yml.j2
    dest: "{{ frigate_config_root }}/config.yml"
    owner: root
    group: root
    mode: "0640"
  when: build_inventory.services.vm210_ai_gpu.frigate.enabled | bool

- name: Deploy compose bundles for AI GPU VM
  ansible.builtin.include_role:
    name: docker
    tasks_from: deploy_compose_bundle.yml
  vars:
    compose_bundle_name: vm210-ai-gpu
    compose_stacks: "{{ build_inventory.services.vm210_ai_gpu | dict2items | selectattr('value.enabled') | map(attribute='key') | list }}"
    docker_host_paths:
      - path: /mnt/appdata/docker_volumes/home-assistant-voice
      - path: /mnt/appdata/docker_volumes/home-assistant-voice/piper
      - path: /mnt/appdata/docker_volumes/home-assistant-voice/whisper
      - path: /mnt/appdata/docker_volumes/home-assistant-voice/openwakeword
      - path: /mnt/appdata/docker_volumes/home-assistant-voice/openwakeword/custom
      - path: /mnt/appdata/docker_volumes/n8n
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
      - path: /mnt/appdata/openvscode/config
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
      - path: /mnt/appdata/code
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
  when: (build_inventory.services.vm210_ai_gpu | dict2items | selectattr('value.enabled') | list | length) > 0
