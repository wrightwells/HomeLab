---
- name: Ensure ai-gpu Ansible remote temp directory exists
  ansible.builtin.file:
    path: "{{ vm210_ai_gpu_remote_tmp }}"
    state: directory
    owner: "{{ ansible_user | default('ansible') }}"
    group: "{{ ansible_user | default('ansible') }}"
    mode: "0700"

- name: Install NVIDIA runtime prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - ubuntu-drivers-common
      - linux-headers-{{ ansible_kernel }}
    state: present
    update_cache: true
  when: vm210_ai_gpu_nvidia_enabled | bool

- name: Ensure Ubuntu restricted repository is enabled
  ansible.builtin.command:
    cmd: add-apt-repository -y restricted
  register: vm210_ai_gpu_restricted_repo
  changed_when: "'Adding component(s)' in vm210_ai_gpu_restricted_repo.stdout"
  when: vm210_ai_gpu_nvidia_enabled | bool

- name: Install NVIDIA Container Toolkit keyring
  ansible.builtin.shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey -o /tmp/nvidia-container-toolkit.gpg
    gpg --batch --yes --dearmor -o {{ vm210_ai_gpu_nvidia_toolkit_keyring }} /tmp/nvidia-container-toolkit.gpg
    chmod a+r {{ vm210_ai_gpu_nvidia_toolkit_keyring }}
    rm -f /tmp/nvidia-container-toolkit.gpg
  when: vm210_ai_gpu_nvidia_enabled | bool

- name: Configure NVIDIA Container Toolkit apt repository
  ansible.builtin.copy:
    dest: "{{ vm210_ai_gpu_nvidia_toolkit_repo_file }}"
    content: "{{ vm210_ai_gpu_nvidia_toolkit_repo }}\n"
    owner: root
    group: root
    mode: "0644"
  when: vm210_ai_gpu_nvidia_enabled | bool

- name: Install NVIDIA driver and container runtime packages
  ansible.builtin.apt:
    name:
      - "{{ vm210_ai_gpu_nvidia_driver_package }}"
      - nvidia-container-toolkit
    state: present
    update_cache: true
  register: vm210_ai_gpu_nvidia_packages
  notify:
    - Restart Docker
    - Reboot ai-gpu
  when: vm210_ai_gpu_nvidia_enabled | bool

- name: Check Docker daemon configuration
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: vm210_ai_gpu_docker_daemon_json
  when: vm210_ai_gpu_nvidia_enabled | bool

- name: Read Docker daemon configuration
  ansible.builtin.slurp:
    path: /etc/docker/daemon.json
  register: vm210_ai_gpu_docker_daemon_json_content
  when:
    - vm210_ai_gpu_nvidia_enabled | bool
    - vm210_ai_gpu_docker_daemon_json.stat.exists

- name: Configure Docker NVIDIA runtime
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --runtime=docker
  notify: Restart Docker
  when:
    - vm210_ai_gpu_nvidia_enabled | bool
    - not vm210_ai_gpu_docker_daemon_json.stat.exists or 'nvidia-container-runtime' not in (vm210_ai_gpu_docker_daemon_json_content.content | b64decode)

- name: Apply pending Docker restart or reboot before GPU validation
  ansible.builtin.meta: flush_handlers

- name: Verify host GPU access
  ansible.builtin.command:
    cmd: nvidia-smi
  register: vm210_ai_gpu_nvidia_smi
  changed_when: false
  when:
    - vm210_ai_gpu_nvidia_enabled | bool
    - vm210_ai_gpu_verify_gpu_runtime | bool

- name: Verify Docker GPU access
  ansible.builtin.command:
    cmd: "docker run --rm --gpus all {{ vm210_ai_gpu_docker_gpu_test_image }} nvidia-smi"
  register: vm210_ai_gpu_docker_nvidia_smi
  changed_when: false
  when:
    - vm210_ai_gpu_nvidia_enabled | bool
    - vm210_ai_gpu_verify_gpu_runtime | bool

- name: Ensure Frigate config directory exists
  ansible.builtin.file:
    path: "{{ frigate_config_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: build_inventory.services.vm210_ai_gpu.frigate.enabled | bool

- name: Ensure Frigate model cache directory exists
  ansible.builtin.file:
    path: "{{ frigate_model_cache_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: build_inventory.services.vm210_ai_gpu.frigate.enabled | bool

- name: Deploy managed Frigate config template
  ansible.builtin.template:
    src: frigate-config.yml.j2
    dest: "{{ frigate_config_root }}/config.yml"
    owner: root
    group: root
    mode: "0640"
  when: build_inventory.services.vm210_ai_gpu.frigate.enabled | bool

- name: Deploy compose bundles for AI GPU VM
  ansible.builtin.include_role:
    name: docker
    tasks_from: deploy_compose_bundle.yml
  vars:
    compose_bundle_name: vm210-ai-gpu
    compose_stacks: "{{ build_inventory.services.vm210_ai_gpu | dict2items | selectattr('value.enabled') | map(attribute='key') | list }}"
    docker_host_paths:
      - path: "{{ frigate_config_root }}"
      - path: "{{ frigate_model_cache_dir }}"
      - path: /mnt/appdata/docker_volumes/portainer
      - path: /mnt/appdata/docker_volumes/searxng/config
      - path: /mnt/appdata/docker_volumes/home-assistant-voice
      - path: /mnt/appdata/docker_volumes/home-assistant-voice/piper
      - path: /mnt/appdata/docker_volumes/home-assistant-voice/whisper
      - path: /mnt/appdata/docker_volumes/home-assistant-voice/openwakeword
      - path: /mnt/appdata/docker_volumes/home-assistant-voice/openwakeword/custom
      - path: /mnt/appdata/docker_volumes/n8n
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
      - path: /mnt/appdata/openvscode/config
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
      - path: /mnt/appdata/code
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
  when: (build_inventory.services.vm210_ai_gpu | dict2items | selectattr('value.enabled') | list | length) > 0

- name: Ensure /mnt/ai_models/ollama directory exists for model storage
  ansible.builtin.file:
    path: /mnt/ai_models/ollama
    state: directory
    owner: root
    group: root
    mode: "0755"
  ignore_errors: true
  failed_when: false

- name: Pull Ollama models into local cache
  ansible.builtin.command:
    cmd: "docker exec -i {{ ollama_container_name }} ollama pull {{ item }}"
  loop: "{{ ollama_models_to_pull }}"
  when:
    - ollama_models_pull_enabled | bool
    - build_inventory.services.vm210_ai_gpu["ai-models"].enabled | bool
  register: ollama_pull_result
  changed_when: "'pulling manifest' in ollama_pull_result.stdout"
  failed_when: false

- name: Verify pulled Ollama models
  ansible.builtin.command:
    cmd: "docker exec {{ ollama_container_name }} ollama list"
  register: ollama_list_result
  changed_when: false
  when: ollama_models_pull_enabled | bool

- name: Install HACS in Home Assistant container
  ansible.builtin.command:
    cmd: "docker exec -i homeassistant bash -c 'wget -O - https://get.hacs.xyz | bash -'"
  register: hacs_install_result
  changed_when: "'HACS is now installed' in hacs_install_result.stdout"
  failed_when: false
  when: build_inventory.services.vm210_ai_gpu["home-assistant"].enabled | bool
