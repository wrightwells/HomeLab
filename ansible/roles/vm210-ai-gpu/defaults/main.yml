---
vm210_ai_gpu_nvidia_enabled: true
vm210_ai_gpu_nvidia_driver_package: nvidia-driver-595-open
vm210_ai_gpu_nvidia_toolkit_keyring: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
vm210_ai_gpu_nvidia_toolkit_repo_file: /etc/apt/sources.list.d/nvidia-container-toolkit.list
vm210_ai_gpu_nvidia_toolkit_repo: "deb [signed-by={{ vm210_ai_gpu_nvidia_toolkit_keyring }}] https://nvidia.github.io/libnvidia-container/stable/deb/amd64 /"
vm210_ai_gpu_docker_gpu_test_image: nvidia/cuda:12.8.0-base-ubuntu24.04
vm210_ai_gpu_verify_gpu_runtime: true
vm210_ai_gpu_remote_tmp: /var/tmp/ansible-remote

frigate_config_root: /mnt/appdata/configs/frigate
frigate_record_enabled: true
frigate_record_retain_days: 3
frigate_event_retain_days: 7
frigate_shm_size: 1024mb
frigate_cache_tmpfs_size: 1073741824
frigate_mqtt_enabled: true
frigate_mqtt_host: "{{ ai_gpu_ip }}"
frigate_mqtt_user: mqtt_user
frigate_mqtt_password: mirror
frigate_global_detect_fps: 5
frigate_global_detect_enabled: true
frigate_tracked_objects:
  - person
  - car
  - animal
frigate_review_detection_labels:
  - car
  - person
  - speech
frigate_model_cache_dir: "{{ frigate_config_root }}/model_cache"
frigate_model_path: /config/model_cache/yolo.onnx
frigate_camera_name: trackmix_front
frigate_camera_sub_rtsp_url: rtsp://admin:St4nl3y11@10.20.1.11:554/h264Preview_01_sub
frigate_camera_main_rtsp_url: rtsp://admin:St4nl3y11@10.20.1.11:554/h264Preview_01_main
frigate_camera_detect_width: 640
frigate_camera_detect_height: 360
frigate_camera_detect_fps: 7
frigate_camera_record_retain_days: 7
frigate_camera_alert_retain_days: 14
frigate_camera_detection_retain_days: 14
frigate_person_min_area: 5000
frigate_person_max_area: 100000
frigate_car_min_area: 15000
frigate_example_camera_enabled: false
frigate_example_camera_name: exampleCamera
frigate_example_camera_sub_rtsp_url: rtsp://REPLACE_ME_EXAMPLE_CAMERA_SUB
frigate_example_camera_main_rtsp_url: rtsp://REPLACE_ME_EXAMPLE_CAMERA_MAIN
frigate_example_camera_detect_width: 640
frigate_example_camera_detect_height: 360
frigate_example_camera_detect_fps: 5

# Ollama model pulls — run after the ai-models stack is deployed.
ollama_models_to_pull:
  - qwen3:8b
  - qwen3:4b
  - qwen2.5-coder:7b
  - qwen2.5vl:7b
  - qwen3-vl:4b
  - llama3:8b
ollama_container_name: ollama-ai
ollama_models_pull_enabled: true
