---
proxmox_storage_allow_destructive_create: false

proxmox_nvme_device: ""
proxmox_nvme_fstype: ext4
proxmox_nvme_mount_root: /mnt/ai_nvme
proxmox_ai_models_subdir: ai_models
proxmox_ai_cache_subdir: ai_cache
proxmox_ai_models_mount: /mnt/ai_models
proxmox_ai_cache_mount: /mnt/ai_cache

proxmox_appdata_zpool_name: appdata
proxmox_appdata_zfs_disks: []
proxmox_appdata_mountpoint: /mnt/appdata

proxmox_media_disks: []
proxmox_media_disk_fstype: xfs
proxmox_media_branch_root: /mnt
proxmox_media_branch_prefix: media_disk
proxmox_media_pool_mount: /mnt/media_pool
proxmox_mergerfs_opts: "defaults,allow_other,use_ino,category.create=mfs,moveonenospc=true,fsname=mergerfs"
proxmox_media_pool_owner: "{{ docker_app_uid | default('1000') }}"
proxmox_media_pool_group: "{{ docker_app_gid | default('1000') }}"
proxmox_media_pool_mode: "0775"
proxmox_media_pool_directories:
  - books
  - music
  - movies
  - tv
  - photos
  - torrents
proxmox_torrents_directories:
  - books
  - music
  - movies
  - tv
  - incomplete
proxmox_appdata_directories:
  - docker_volumes
  - configs
proxmox_appdata_service_directories:
  # lxc220 is unprivileged, so these ownership values are the host-shifted IDs
  # for container postgres (70:70) and planka app user (1000:1000).
  - path: "{{ proxmox_appdata_mountpoint }}/docker_volumes/planka"
    owner: "100000"
    group: "100000"
    mode: "0755"
  - path: "{{ proxmox_appdata_mountpoint }}/docker_volumes/planka/planka-db"
    owner: "100070"
    group: "100070"
    mode: "0700"
  - path: "{{ proxmox_appdata_mountpoint }}/docker_volumes/planka/planka-data"
    owner: "101000"
    group: "101000"
    mode: "0755"
  # lxc200 is unprivileged; filebrowser runs as UID/GID 1000 inside the container.
  - path: "{{ proxmox_appdata_mountpoint }}/docker_volumes/filebrowser-docker-services"
    owner: "101000"
    group: "101000"
    mode: "0755"
  - path: "{{ proxmox_appdata_mountpoint }}/docker_volumes/filebrowser-docker-services/database"
    owner: "101000"
    group: "101000"
    mode: "0755"
  # lxc220 grist runs as container root, so shared bind mounts need the
  # host-shifted root ownership.
  - path: "{{ proxmox_appdata_mountpoint }}/docker_volumes/grist"
    owner: "100000"
    group: "100000"
    mode: "0755"
  - path: "{{ proxmox_appdata_mountpoint }}/docker_volumes/grist/grist-data"
    owner: "100000"
    group: "100000"
    mode: "0755"
