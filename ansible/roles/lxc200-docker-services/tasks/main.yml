---
- name: Seed filebrowser settings.json with valid JSON
  ansible.builtin.copy:
    dest: /mnt/appdata/docker_volumes/filebrowser-docker-services/settings.json
    content: "{}\n"
    force: false
    mode: "0644"
  when: build_inventory.services.lxc200_docker_services.filebrowser.enabled | default(false) | bool

- name: Repair Syncthing shared path ownership
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ docker_app_uid }}"
    group: "{{ docker_app_gid }}"
    recurse: true
  loop:
    - /mnt/appdata/docker_volumes/syncthing/config
    - /mnt/appdata/syncthing_sync
  when: build_inventory.services.lxc200_docker_services.syncthing.enabled | default(false) | bool

- name: Deploy compose bundles for docker-services
  ansible.builtin.include_role:
    name: docker
    tasks_from: deploy_compose_bundle.yml
  vars:
    compose_bundle_name: lxc200-docker-services
    compose_stacks: "{{ build_inventory.services.lxc200_docker_services | dict2items | selectattr('value.enabled') | map(attribute='key') | list }}"
    docker_host_paths:
      - path: /mnt/appdata/docker_volumes/portainer
      - path: /mnt/appdata/docker_volumes/filebrowser-docker-services
      - path: /mnt/appdata/docker_volumes/filebrowser-docker-services/database
      - path: /mnt/appdata/docker_volumes/immich/model-cache
      - path: /mnt/appdata/docker_volumes/immich/db
      - path: /mnt/appdata/docker_volumes/owncloud/data
      - path: /mnt/appdata/docker_volumes/owncloud/db
      - path: /mnt/appdata/docker_volumes/paperless-ngx
      - path: /mnt/appdata/docker_volumes/paperless-ngx/db
      - path: /mnt/appdata/docker_volumes/paperless-ngx/data
      - path: /mnt/appdata/docker_volumes/paperless-ngx/media
      - path: /mnt/appdata/docker_volumes/paperless-ngx/export
      - path: /mnt/appdata/docker_volumes/paperless-ngx/consume
      - path: /mnt/appdata/docker_volumes/syncthing/config
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
      - path: /mnt/appdata/syncthing_sync
        owner: "{{ docker_app_uid }}"
        group: "{{ docker_app_gid }}"
  when: (build_inventory.services.lxc200_docker_services | dict2items | selectattr('value.enabled') | list | length) > 0
