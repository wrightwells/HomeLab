---
- name: Ensure compose root exists
  ansible.builtin.file:
    path: "{{ docker_compose_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure application directories exist
  ansible.builtin.file:
    path: "{{ docker_compose_root }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - immich
    - owncloud
    - syncthing

- name: Copy compose files
  ansible.builtin.copy:
    src: "{{ item }}/"
    dest: "{{ docker_compose_root }}/{{ item }}/"
    owner: root
    group: root
    mode: preserve
  loop:
    - immich
    - owncloud
    - syncthing

- name: Start compose stacks
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_root }}/{{ item }}"
    state: present
  loop:
    - immich
    - owncloud
    - syncthing
