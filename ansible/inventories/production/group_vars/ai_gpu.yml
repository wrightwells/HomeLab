---
ansible_remote_tmp: /var/tmp/ansible-remote
ansible_ssh_private_key_file: "{{ lookup('env', 'HOMELAB_SSH_PRIVATE_KEY_FILE') | default(lookup('env', 'HOME') + '/.ssh/id_ed25519', true) }}"
ansible_ssh_common_args: "-o IdentitiesOnly=yes"
# Override docker_hosts password-based auth -- VMs use key-based auth only.
ansible_ssh_pass: ""
