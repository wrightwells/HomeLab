---
# Rotate root password on all LXC containers.
#
# Tradeoff note (see README-bootstrap.md step 7.4):
# The LXC root password uses the same plain-text secret as the Ansible vault
# password. This playbook sets the root password to a hash derived from that
# vaulted value.
#
# If you use this playbook, define lxc_root_password_hash as a hash of your
# vault password. If you prefer to set the plain-text vault password directly,
# you can use the chpasswd approach documented in the bootstrap guide instead.

- name: Rotate root password on all LXC containers
  hosts: docker_arr:docker_services:docker_apps:docker_media:docker_external:infra
  become: true
  gather_facts: false
  vars_files:
    - ../inventories/production/group_vars/lxc_root_passwords.vault.yml
  pre_tasks:
    - name: Ensure a vaulted LXC root password hash is configured
      ansible.builtin.assert:
        that:
          - lxc_root_password_hash is defined
          - lxc_root_password_hash | length > 0
        fail_msg: >
          Define lxc_root_password_hash in
          inventories/production/group_vars/lxc_root_passwords.vault.yml.
          This should be a hash generated from the same plain-text secret used
          as the Ansible vault password (see README-bootstrap.md step 7.4).

  tasks:
    - name: Set the root password on each LXC
      ansible.builtin.user:
        name: root
        password: "{{ lxc_root_password_hash }}"
        update_password: always
      no_log: true
