services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: rustdesk_tailscale
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - /mnt/appdata/docker_volumes/rustdesk/tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun

  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk_id
    command: hbbs
    restart: unless-stopped
    environment:
      - ALWAYS_USE_RELAY=Y
    volumes:
      - /mnt/appdata/docker_volumes/rustdesk/data:/root
    network_mode: service:tailscale
    depends_on:
      - tailscale
      - hbbr

  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk_relay
    command: hbbr
    restart: unless-stopped
    volumes:
      - /mnt/appdata/docker_volumes/rustdesk/data:/root
    network_mode: service:tailscale
    depends_on:
      - tailscale
