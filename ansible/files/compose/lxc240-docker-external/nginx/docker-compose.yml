services:
  nginx:
    image: nginx:1.28-alpine
    container_name: nginx
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      TZ: ${TZ}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /mnt/appdata/configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /mnt/appdata/configs/nginx/conf.d:/etc/nginx/conf.d:ro
      - /mnt/appdata/configs/nginx/certs:/etc/nginx/certs:ro
      - /mnt/appdata/docker_volumes/nginx/html:/usr/share/nginx/html:ro
      - /mnt/appdata/docker_volumes/nginx/logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3