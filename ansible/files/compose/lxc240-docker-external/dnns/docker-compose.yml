services:
  cloudflare-ddns-all:
    image: oznu/cloudflare-ddns:latest
    container_name: cloudflare-ddns-all
    environment:
      - API_KEY=iU-uI1ifmuEwb8yrMSGNLYGvgLUwA05hG1M1u21Z
      - ZONE=wrightwells.com
      - SUBDOMAIN=*
      - PROXIED=false
      - DELETE_ON_STOP=true
      - DNS_SERVER=10.10.20.1
    restart: unless-stopped

