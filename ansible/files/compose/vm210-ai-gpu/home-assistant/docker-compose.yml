services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - TZ=Europe/London
    volumes:
      - /mnt/appdata/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
