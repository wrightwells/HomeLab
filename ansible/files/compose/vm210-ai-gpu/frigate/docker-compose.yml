services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    environment:
      - TZ=Europe/London
    ports:
      - "5000:5000"
    volumes:
      - /mnt/appdata/configs/frigate:/config
      - /mnt/ai_cache/frigate_recordings:/media/frigate
      - /etc/localtime:/etc/localtime:ro
