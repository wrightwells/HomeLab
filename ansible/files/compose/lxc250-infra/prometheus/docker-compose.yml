services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: "0"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - /mnt/appdata/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/appdata/docker_volumes/prometheus/data:/prometheus
