services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    ports:
      - "32400:32400"
    volumes:
      - /mnt/appdata/docker_volumes/plex:/config
      - /mnt/media_pool:/media
