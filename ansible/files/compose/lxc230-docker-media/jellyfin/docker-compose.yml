services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    ports:
      - "8096:8096"
    volumes:
      - /mnt/appdata/docker_volumes/jellyfin:/config
      - /mnt/media_pool:/media
