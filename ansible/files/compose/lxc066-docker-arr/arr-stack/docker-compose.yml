services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    # Hostname to use for container, required in some instances for the rest of the stack to each other endpoints 
    hostname: gluetun
    # line above must be uncommented to allow external containers to connect.
    # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/connect-a-container-to-gluetun.md#external-container-to-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 6881:6881
      - 6881:6881/udp
      - 8085:8085 # qbittorrent - downloading
      - 9117:9117 # Jackett - indexing
      - 8989:8989 # Sonarr - tv
      - 9696:9696 # Prowlarr - indexing
      - 7878:7878 # Radarr - moives
      - 8686:8686 # Lidarr - music
      - 6767:6767 # Bazarr - subtitles
      - 8787:8787 # Readarr - books

      
    volumes:
      - /mnt/appdata/docker_volumes/gluetun:/gluetun
    env_file:
      - stack.env
    environment:
      - FIREWALL_INPUT_PORTS=8085,9117,8989,9696,7878,8686,6767,7575,8080,8787
      - FIREWALL_OUTBOUND_SUBNETS=100.64.0.0/10
      # See https://github.com/qdm12/gluetun-wiki/tree/main/setup#setup
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}      # nordvpn
      # - VPN_TYPE=wireguard
      # OpenVPN:
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_REGIONS=${SERVER_REGIONS}
      # Wireguard:
      #- WIREGUARD_PRIVATE_KEY=<YOUR_PRIVATE_KEY> # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/providers/nordvpn.md#obtain-your-wireguard-private-key
      #- WIREGUARD_ADDRESSES=10.5.0.2/32
      # Timezone for accurate log times
      - TZ=${TZ}
      # Server list updater
      # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/servers.md#update-the-vpn-servers-list
      - UPDATER_PERIOD=24h
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: "service:gluetun"
    env_file:
      - stack.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - WEBUI_PORT=8085
    volumes:
      - /mnt/appdata/docker_volumes/qbittorrent:/config
      - /mnt/media_pool/torrents:/downloads

    depends_on:
      - gluetun
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    env_file:
      - stack.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - /mnt/appdata/docker_volumes/prowlarr:/config
    restart: unless-stopped

  
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: "service:gluetun"
    env_file:
      - stack.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - /mnt/appdata/docker_volumes/sonarr:/config
      - /mnt/media_pool:/media
    restart: unless-stopped
    
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: "service:gluetun"
    env_file:
      - stack.env
    environment:
