services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    environment:
      - TZ=Europe/London
      - PUID=1000
      - PGID=1000
    ports:
      - "8081:80"
    volumes:
      - /mnt/media_pool:/srv
      - /mnt/appdata/docker_volumes/filebrowser/database:/database
      - /mnt/appdata/docker_volumes/filebrowser/settings.json:/config/settings.json
