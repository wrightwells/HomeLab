services:
  aurral:
    image: ghcr.io/lklynet/aurral:latest
    container_name: aurral
    restart: unless-stopped
    environment:
      - TZ=Europe/London
    ports:
      - "3000:3000"
    volumes:
      - /mnt/appdata/docker_volumes/aurral:/app/backend/data
      - /mnt/media_pool/torrents:/app/downloads
