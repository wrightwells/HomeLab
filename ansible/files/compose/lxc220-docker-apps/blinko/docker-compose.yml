services:
  blinko-db:
    image: postgres:16
    container_name: blinko-db
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      POSTGRES_DB=${POSTGRES_DB}
      POSTGRES_USER=${POSTGRES_USER}
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      TZ=${TZ}
    volumes:
      - /mnt/appdata/docker_volumes/blinko/db:/var/lib/postgresql/data

  blinko:
    image: blinkospace/blinko:latest
    container_name: blinko
    restart: unless-stopped
    ports:
      - "10.10.20.220:1111:1111"
    env_file:
      - stack.env
    environment:
      TZ=${TZ}
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@blinko-db:5432/${POSTGRES_DB}
      # Public URL
      NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      # File storage
      STORAGE_LOCAL_PATH: /app/storage
      # Ollama AI
      OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      OLLAMA_MODEL=${OLLAMA_MODEL}
    volumes:
      - /mnt/appdata/docker_volumes/blinko/files:/app/storage
      
