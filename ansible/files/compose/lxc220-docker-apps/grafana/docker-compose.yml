services:
  grafana:
    container_name: grafana
    image: grafana/grafana
    restart: unless-stopped
    user: "0"
    ports:
    - "3000:3000"
    environment:
    - GF_PATHS_DATA=/var/lib/grafana
    - GF_PATHS_LOGS=/var/log/grafana
    volumes:
    - /mnt/appdata/docker_volumes/grafana/data:/var/lib/grafana
    - /mnt/appdata/docker_volumes/grafana/log:/var/log/grafana