version: "3.9"

services:
  connector:
    image: "grist-finance-connector:${IMAGE_TAG:-0.1.0}"
    container_name: grist-finance-connector
    env_file:
      - stack.env
    ports:
      - "${SERVICE_PORT:-8080}:8080"
    volumes:
      - connector_state:/data/state
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  connector_state:
