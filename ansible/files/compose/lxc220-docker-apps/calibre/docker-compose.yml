services:
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    env_file:
      - stack.env
    environment:
      - TZ=${TZ}
      - PUID=1000
      - PGID=1000
      - PASSWORD=${PASSWORD}
      - CLI_ARGS=${CLI_ARGS}
    ports:
      - "8083:8080"
      - "8181:8181"
    volumes:
      - calibre-data:/config

volumes:
  calibre-data:
