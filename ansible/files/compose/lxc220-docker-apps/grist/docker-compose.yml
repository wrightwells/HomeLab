services:
  grist:
    image: gristlabs/grist:latest
    container_name: grist
    ports:
      - "8484:8484"
    volumes:
      - grist-data:/persist
    env_file:
      - stack.env
    environment:
      - GRIST_SESSION_SECRET=${GRIST_SESSION_SECRET}
      - GRIST_SANDBOX_FLAVOR=${GRIST_SANDBOX_FLAVOR}
      - GRIST_DEFAULT_EMAIL=${GRIST_DEFAULT_EMAIL}
    restart: unless-stopped

volumes:
  grist-data:
