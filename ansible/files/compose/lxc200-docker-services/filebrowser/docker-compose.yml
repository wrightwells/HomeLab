services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    command:
      - --database
      - /database/filebrowser.db
      - --config
      - /config/settings.json
      - --root
      - /srv
    environment:
      - TZ=Europe/London
      - PUID=0
      - PGID=0
      - FB_ADDRESS=0.0.0.0
      - FB_PORT=80
    ports:
      - "8081:80"
    volumes:
      - /mnt/appdata:/srv
      - /mnt/appdata/docker_volumes/filebrowser-docker-services/database:/database
      - /mnt/appdata/docker_volumes/filebrowser-docker-services/settings.json:/config/settings.json
